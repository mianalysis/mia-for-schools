  <body class="min-h-screen">
    <div id="root"></div>
    <script type="module" src="./src/index.tsx"></script>
    <script>
      (async () => {
        try {
          // await cheerpjInit();

                13238272, 15073280, 15335424, 15466496, 15597568, 15990784, 16252928, 17170432,

                19136512, 19529728, 19660800, 20185088, 20316160, 20840448, 26869760,
              ],
              '/lt/etc/users': [0, 131072],
              '/lt/etc/localtime': [],
              '/lt/8/jre/lib/cheerpj-awt.jar': [0, 131072],
              '/lt/8/lib/ext/meta-index': [0, 131072],
              '/lt/8/lib/ext': [],
              '/lt/8/lib/ext/index.list': [],

              '/lt/8/lib/jaxp.properties': [],
              '/lt/8/lib/xerces.properties': [],

          const cj = await cheerpjRunLibrary(
            '/app/mia-for-schools/mia-local-server-0.0.1-SNAPSHOT-jar-with-dependencies.jar'
          );

          window.cj = cj;

          const Initialiser = await cj.io.github.mianalysis.miaserver.utils.Initialiser;
          const initialiser = await new Initialiser();
          await initialiser.initialise();

          const AvailableModules = await cj.io.github.mianalysis.mia.module.AvailableModules;

          // Signal that CheerpJ is ready
          window.cheerpjReady = true;
          window.dispatchEvent(new Event('cheerpj-ready'));
        } catch (e) {
          console.error('Error:', e);
        }
      })();
    </script>
