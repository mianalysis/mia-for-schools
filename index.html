<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#56afca" />
    <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
    <title>MIA for Schools</title>
  </head>

  <body class="min-h-screen">
    <div id="root"></div>
    <script type="module" src="./src/index.tsx"></script>
    <script>
      (async () => {
        try {
          await cheerpjInit();

          // const cj = await cheerpjRunLibrary("mia-local-server-0.0.1-SNAPSHOT-jar-with-dependencies.jar");
          const cj = await cheerpjRunLibrary(
            '/app/mia-for-schools/mia-local-server-0.0.1-SNAPSHOT-jar-with-dependencies.jar'
          );

          // const cj = await cheerpjRunLibrary("/app/MIA_SERVER_-0.0.1-SNAPSHOT.jar");
          window.cj = cj;

          const Initialiser = await cj.io.github.mianalysis.miaserver.utils.Initialiser;
          const initialiser = await new Initialiser();
          await initialiser.initialise();

          const AvailableModules = await cj.io.github.mianalysis.mia.module.AvailableModules;

          // Signal that CheerpJ is ready
          window.cheerpjReady = true;
          window.dispatchEvent(new Event('cheerpj-ready'));
        } catch (e) {
          console.error('Error:', e);
        }
      })();
    </script>
  </body>
</html>
